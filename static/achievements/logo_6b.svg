<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 70 520 460" role="img" aria-label="Логотип 6Б">
  <title>Логотип 6Б</title>
  <desc>Шестиугольная эмблема 6Б в техно стиле, без фона.</desc>

  <!-- Внешний шестиугольник -->
  <polygon points="560,300 450,110 230,110 120,300 230,490 450,490"
    fill="none" stroke="#00e5ff" stroke-width="2.5"/>

  <!-- Пунктирный средний шестиугольник -->
  <polygon points="510,300 415,135 265,135 170,300 265,465 415,465"
    fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.6"/>

  <!-- Внутренний шестиугольник (пурпурный) -->
  <polygon points="470,300 385,150 295,150 210,300 295,450 385,450"
    fill="none" stroke="#d946ef" stroke-width="1.5"/>

  <!-- Узловые точки -->
  <g fill="#00e5ff">
    <circle cx="560" cy="300" r="6"/>
    <circle cx="450" cy="110" r="6"/>
    <circle cx="230" cy="110" r="6"/>
    <circle cx="120" cy="300" r="6"/>
    <circle cx="230" cy="490" r="6"/>
    <circle cx="450" cy="490" r="6"/>
  </g>

  <!-- Главная надпись 6Б -->
  <text x="340" y="345"
    font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
    font-size="150" font-weight="700" fill="#00e5ff"
    text-anchor="middle" letter-spacing="-2">6Б</text>

  <!-- Декоративные пурпурные линии -->
  <g stroke="#d946ef" stroke-width="1.5">
    <line x1="245" y1="365" x2="290" y2="365"/>
    <line x1="390" y1="365" x2="435" y2="365"/>
  </g>

  <!-- Декоративные точки внизу -->
  <g>
    <circle cx="305" cy="425" r="2" fill="#00e5ff"/>
    <circle cx="320" cy="425" r="2" fill="#00e5ff"/>
    <circle cx="335" cy="425" r="2.5" fill="#d946ef"/>
    <circle cx="350" cy="425" r="2" fill="#00e5ff"/>
    <circle cx="365" cy="425" r="2" fill="#00e5ff"/>
  </g>
</svg>
